name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pytest pytest-cov numpy scipy

      - name: Run tests
        run: |
          pytest tests/test_black_scholes.py tests/test_greeks.py tests/test_realized_vol.py tests/test_newton_raphson.py --cov=src/pricer --cov=src/analysis/realized_vol --cov-report=term-missing -v
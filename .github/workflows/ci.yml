name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pytest pytest-cov numpy scipy nba-api pandas requests

      - name: Run tests
        run: |
          pytest tests/ --cov=src/pricer --cov=src/analysis/realized_vol --cov-report=term-missing -v